services:

  api:
    build: .
    container_name: fastapi_app

    ports:
      - "8000:8000"

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: nabil
      DB_PASSWORD: 123456
      DB_NAME: CarPricePrediction

    volumes:
      - .:/app

  mysql:
    image: mysql:8.0
    container_name: mysql_db

    restart: always

    env_file:
      - .env

    ports:
      - "3307:3306"

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot --password=\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: